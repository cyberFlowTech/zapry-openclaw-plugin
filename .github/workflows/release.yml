name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          set -e
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag ($TAG_VERSION) 与 package.json ($PKG_VERSION) 不一致，拒绝发版"
            exit 1
          fi
          echo "✓ tag v$PKG_VERSION matches package.json"

      - name: Build (tsc)
        run: npm run build

      # OIDC Trusted Publishing 需要 npm >= 11.5.1，
      # 直接用 npx 拿最新 npm 跑 publish（避免 `npm install -g npm@latest` 就地升级 npm 自己导致的 promise-retry 故障）。
      # 不设置 NODE_AUTH_TOKEN：npm 会自动通过 GitHub OIDC 与 npm registry 交换短期凭证，
      # 要求 npmjs.com 的包页面已把当前仓库配为 Trusted Publisher。
      - name: Publish to npm (OIDC + provenance)
        run: npx -y npm@latest publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
